; DJI-батарея тестер на Waveshare ESP32-S3-Touch-LCD-2 (240x320, ST7789T3)
; Прошивка/консоль — по USB-C (native USB CDC); UART0-пины 43/44 свободны под батарею.
[env:esp32-s3-touch-lcd-2]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1   ; Serial = USB-CDC, поэтому UART0(43/44) можно занять батареей
  -DARDUINO_USB_MODE=1
lib_deps =
  moononournation/GFX Library for Arduino@^1.5.0
